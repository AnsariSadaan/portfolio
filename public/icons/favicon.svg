
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <defs>
        <!-- Dark Theme Gradient (Matches your portfolio) -->
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#0D0D0D;stop-opacity:1" />
        </linearGradient>
        
        <!-- Light Theme Gradient (For light mode) -->
        <linearGradient id="gradLight" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#F5F5F5;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#E8E8E8;stop-opacity:1" />
        </linearGradient>
      </defs>
      
      <!-- Dark Background -->
      <rect width="100" height="100" rx="20" fill="url(#grad)" />
      
      <!-- Inner Border Accent -->
      <rect x="8" y="8" width="84" height="84" rx="14" fill="none" stroke="#333333" stroke-width="2" />
      
      <!-- Minimal Decorative Dot -->
      <circle cx="85" cy="20" r="4" fill="#404040" />
      <circle cx="15" cy="85" r="3" fill="#333333" />
      
      <!-- SA Text - White for dark mode -->
      <text x="50" y="50" 
        font-family="'Inter', 'Segoe UI', Arial, sans-serif" 
        font-size="46" 
        font-weight="800"
        fill="#FFFFFF" 
        text-anchor="middle" 
        dominant-baseline="central"
        letter-spacing="1.5"
      >SA</text>
    </svg>
  